<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />
  <title>BB Chat</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root {
      --bg: #0b1020;
      --bg2: #111a33;
      --card: rgba(24, 33, 58, 0.72);
      --card-border: rgba(255, 255, 255, 0.08);
      --text: #f5f7ff;
      --muted: #9aa6c7;
      --accent: #5b8cff;
      --accent-2: #7c5cff;
      --input: rgba(255,255,255,0.06);
      --bubble-me: linear-gradient(135deg, #5b8cff, #7c5cff);
      --bubble-other: rgba(255,255,255,0.08);
      --danger: #ff6b6b;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background:
        radial-gradient(circle at top left, rgba(91,140,255,0.20), transparent 28%),
        radial-gradient(circle at top right, rgba(124,92,255,0.18), transparent 30%),
        linear-gradient(180deg, var(--bg), #08101f 100%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    .app {
      height: 100%;
      display: flex;
      flex-direction: column;
      padding-top: var(--safe-top);
      padding-bottom: var(--safe-bottom);
    }

    .topbar {
      padding: 14px 16px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      backdrop-filter: blur(18px);
      background: rgba(10, 16, 31, 0.45);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      position: relative;
      z-index: 10;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .logo {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #f8c15f, #ff9f5a);
      color: white;
      font-weight: 800;
      letter-spacing: 0.02em;
      box-shadow: 0 10px 30px rgba(255, 159, 90, 0.25);
      flex-shrink: 0;
    }

    .titles {
      min-width: 0;
    }

    .title {
      font-size: 20px;
      font-weight: 800;
      line-height: 1.1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .subtitle {
      margin-top: 3px;
      font-size: 13px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: #41d17d;
      box-shadow: 0 0 12px rgba(65, 209, 125, 0.9);
      flex-shrink: 0;
    }

    .main {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      padding: 12px;
    }

    .notice {
      margin-bottom: 10px;
      border-radius: 18px;
      padding: 14px 16px;
      background: rgba(255,255,255,0.06);
      color: var(--muted);
      border: 1px solid rgba(255,255,255,0.06);
      font-size: 14px;
      display: none;
    }

    .notice.show {
      display: block;
    }

    .messages-wrap {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      border-radius: 26px;
      background: var(--card);
      border: 1px solid var(--card-border);
      backdrop-filter: blur(18px);
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(0,0,0,0.22);
    }

    .messages {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 16px;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar {
      width: 0;
      height: 0;
    }

    .empty {
      text-align: center;
      color: var(--muted);
      padding: 40px 16px;
      font-size: 15px;
    }

    .row {
      display: flex;
      margin-bottom: 12px;
    }

    .row.me {
      justify-content: flex-end;
    }

    .bubble {
      max-width: 82%;
      border-radius: 20px;
      padding: 12px 14px 10px;
      background: var(--bubble-other);
      border: 1px solid rgba(255,255,255,0.06);
      box-shadow: 0 8px 24px rgba(0,0,0,0.14);
      word-wrap: break-word;
      overflow-wrap: break-word;
    }

    .row.me .bubble {
      background: var(--bubble-me);
      border: none;
    }

    .name {
      font-size: 12px;
      color: #c9d4ff;
      opacity: 0.95;
      margin-bottom: 5px;
      font-weight: 700;
    }

    .row:not(.me) .name {
      color: #b7c4ea;
    }

    .text {
      font-size: 16px;
      line-height: 1.35;
      white-space: pre-wrap;
    }

    .meta {
      margin-top: 6px;
      font-size: 11px;
      opacity: 0.72;
      text-align: right;
    }

    .composer {
      display: flex;
      gap: 10px;
      padding: 12px;
      border-top: 1px solid rgba(255,255,255,0.06);
      background: rgba(7, 12, 24, 0.30);
      backdrop-filter: blur(12px);
    }

    .input {
      flex: 1;
      min-width: 0;
      border: none;
      outline: none;
      border-radius: 18px;
      background: var(--input);
      color: var(--text);
      padding: 14px 16px;
      font-size: 16px;
    }

    .input::placeholder {
      color: #8090ba;
    }

    .send {
      border: none;
      outline: none;
      border-radius: 18px;
      padding: 0 18px;
      min-width: 54px;
      background: linear-gradient(135deg, #5b8cff, #7c5cff);
      color: white;
      font-size: 15px;
      font-weight: 700;
      box-shadow: 0 10px 25px rgba(91, 140, 255, 0.30);
    }

    .send:disabled {
      opacity: 0.5;
      box-shadow: none;
    }

    .blocked {
      position: fixed;
      inset: 0;
      background: rgba(2, 5, 13, 0.70);
      backdrop-filter: blur(12px);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 50;
    }

    .blocked.show {
      display: flex;
    }

    .blocked-card {
      width: 100%;
      max-width: 420px;
      background: rgba(20, 28, 50, 0.96);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 28px;
      padding: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    }

    .blocked-title {
      font-size: 30px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .blocked-text {
      font-size: 16px;
      color: var(--muted);
      line-height: 1.45;
      margin-bottom: 18px;
    }

    .blocked-btn {
      width: 100%;
      border: none;
      border-radius: 18px;
      padding: 16px;
      font-size: 18px;
      font-weight: 700;
      color: white;
      background: rgba(255,255,255,0.08);
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="brand">
        <div class="logo">BB</div>
        <div class="titles">
          <div class="title">BB Chat</div>
          <div class="subtitle" id="subtitle">Подключение...</div>
        </div>
      </div>
      <div class="status-dot"></div>
    </div>

    <div class="main">
      <div class="notice show" id="notice">Запускаем чат...</div>

      <div class="messages-wrap">
        <div class="messages" id="messages">
          <div class="empty" id="empty">Сообщений пока нет</div>
        </div>

        <div class="composer">
          <input
            id="messageInput"
            class="input"
            type="text"
            placeholder="Написать сообщение..."
            maxlength="1000"
          />
          <button id="sendBtn" class="send">↑</button>
        </div>
      </div>
    </div>
  </div>

  <div class="blocked show" id="blocked">
    <div class="blocked-card">
      <div class="blocked-title">BB Chat</div>
      <div class="blocked-text" id="blockedText">Проверяем доступ...</div>
      <button class="blocked-btn" onclick="location.reload()">Обновить</button>
    </div>
  </div>

  <script>
    // =========================
    // ВСТАВЬ СВОИ ДАННЫЕ СЮДА
    // =========================
    const SUPABASE_URL = "PASTE_SUPABASE_URL_HERE";
    const SUPABASE_KEY = "PASTE_SUPABASE_PUBLISHABLE_KEY_HERE";

    // '*' = пускать всех. Потом можно заменить на массив ID.
    const ALLOWED_TELEGRAM_IDS = ["*"];

    // =========================
    // APP
    // =========================
    const tg = window.Telegram?.WebApp;
    if (tg) {
      tg.ready();
      tg.expand();
      try {
        tg.disableVerticalSwipes();
      } catch (e) {}
    }

    const blocked = document.getElementById("blocked");
    const blockedText = document.getElementById("blockedText");
    const notice = document.getElementById("notice");
    const subtitle = document.getElementById("subtitle");
    const messagesEl = document.getElementById("messages");
    const emptyEl = document.getElementById("empty");
    const inputEl = document.getElementById("messageInput");
    const sendBtn = document.getElementById("sendBtn");

    const user = tg?.initDataUnsafe?.user || null;
    const userId = user?.id ? String(user.id) : null;
    const username = user?.username || "";
    const authorName = [user?.first_name, user?.last_name].filter(Boolean).join(" ").trim() || "Гость";
    const roomId = "main";

    let supabase = null;
    let loading = false;
    let loadedIds = new Set();

    function showNotice(text) {
      notice.textContent = text;
      notice.classList.add("show");
    }

    function hideNotice() {
      notice.classList.remove("show");
    }

    function formatTime(dateString) {
      const d = new Date(dateString);
      return d.toLocaleTimeString("ru-RU", {
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function checkAccess() {
      if (!tg || !userId) {
        blockedText.textContent = "Открой мини-приложение именно внутри Telegram.";
        return false;
      }

      if (ALLOWED_TELEGRAM_IDS.includes("*")) {
        blocked.classList.remove("show");
        return true;
      }

      const allowed = ALLOWED_TELEGRAM_IDS.map(String);
      if (!allowed.includes(String(userId))) {
        blockedText.textContent = `Доступ закрыт. Твой Telegram ID: ${userId}`;
        return false;
      }

      blocked.classList.remove("show");
      return true;
    }

    function appendMessage(msg) {
      if (!msg || loadedIds.has(msg.id)) return;
      loadedIds.add(msg.id);

      emptyEl.style.display = "none";

      const isMe = String(msg.telegram_id) === String(userId);
      const row = document.createElement("div");
      row.className = "row" + (isMe ? " me" : "");

      row.innerHTML = `
        <div class="bubble">
          <div class="name">${escapeHtml(msg.author_name || "Гость")}</div>
          <div class="text">${escapeHtml(msg.text || "")}</div>
          <div class="meta">${formatTime(msg.created_at)}</div>
        </div>
      `;

      messagesEl.appendChild(row);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function renderAll(list) {
      messagesEl.innerHTML = "";
      loadedIds.clear();

      if (!list || !list.length) {
        messagesEl.innerHTML = `<div class="empty" id="empty">Сообщений пока нет</div>`;
        return;
      }

      list.forEach(appendMessage);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    async function loadMessages() {
      if (!supabase) return;

      showNotice("Загружаем сообщения...");

      const { data, error } = await supabase
        .from("room_messages")
        .select("*")
        .eq("room_id", roomId)
        .order("created_at", { ascending: true })
        .limit(200);

      if (error) {
        console.error(error);
        showNotice("Ошибка загрузки сообщений. Проверь Supabase URL, key и SQL.");
        return;
      }

      renderAll(data || []);
      hideNotice();
    }

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text || !supabase || !userId || loading) return;

      loading = true;
      sendBtn.disabled = true;

      const payload = {
        room_id: roomId,
        telegram_id: String(userId),
        author_name: authorName,
        username: username,
        text: text
      };

      const { error } = await supabase.from("room_messages").insert(payload);

      if (error) {
        console.error(error);
        showNotice("Не удалось отправить сообщение.");
      } else {
        inputEl.value = "";
        hideNotice();
      }

      loading = false;
      sendBtn.disabled = false;
      inputEl.focus();
    }

    function subscribeRealtime() {
      if (!supabase) return;

      supabase
        .channel("bbchat-room-main")
        .on(
          "postgres_changes",
          {
            event: "INSERT",
            schema: "public",
            table: "room_messages",
            filter: "room_id=eq.main"
          },
          (payload) => {
            appendMessage(payload.new);
          }
        )
        .subscribe();
    }

    async function init() {
      subtitle.textContent = user ? `@${user.username || "user"} • online` : "Telegram Mini App";

      if (!checkAccess()) return;

      if (
        !SUPABASE_URL ||
        !SUPABASE_KEY ||
        SUPABASE_URL.includes("PASTE_") ||
        SUPABASE_KEY.includes("PASTE_")
      ) {
        blocked.classList.add("show");
        blockedText.textContent = "Вставь в index.html свой SUPABASE_URL и SUPABASE_KEY.";
        showNotice("Нужно вставить ключи Supabase.");
        return;
      }

      try {
        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
      } catch (e) {
        console.error(e);
        blocked.classList.add("show");
        blockedText.textContent = "Не удалось создать подключение к Supabase.";
        showNotice("Ошибка подключения.");
        return;
      }

      await loadMessages();
      subscribeRealtime();
    }

    sendBtn.addEventListener("click", sendMessage);

    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        sendMessage();
      }
    });

    init();
  </script>
</body>
</html>
